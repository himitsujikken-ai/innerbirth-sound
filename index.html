<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>InnerBirth Sound v5 - 意識覚醒周波数</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#080810; --surface:#111120; --surface2:#1a1a2e; --surface3:#252540;
  --text:#e8e4e0; --text2:#9898a8; --text3:#585868;
  --gold:#d4a843; --gold-dim:rgba(212,168,67,.12);
  --cyan:#43b0a8; --cyan-dim:rgba(67,176,168,.12);
  --purple:#7868b8; --purple-dim:rgba(120,104,184,.12);
  --red:#d04848; --r:12px;
  --shadow:0 4px 20px rgba(0,0,0,.4);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{font-size:16px}
body{background:var(--bg);color:var(--text);font-family:'Noto Serif JP',serif;line-height:1.5;min-height:100vh;min-height:100dvh;overflow-x:hidden}
.view{position:fixed;inset:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;background:var(--bg);transition:opacity .4s,transform .4s}
.view.away{opacity:0;pointer-events:none;transform:translateY(16px)}
#vMixer.away{transform:translateX(24px)}

/* === MAIN VIEW === */
#vMain{display:flex;flex-direction:column;align-items:center;padding:env(safe-area-inset-top,20px) 20px calc(env(safe-area-inset-bottom,0px)+32px);padding-top:max(env(safe-area-inset-top,0px),20px)}
.header{width:100%;display:flex;align-items:center;justify-content:space-between;padding-bottom:16px;border-bottom:1px solid var(--surface2);margin-bottom:20px}
.brand-jp{font-size:18px;font-weight:700;letter-spacing:4px}
.brand-en{font-family:'Cormorant Garamond',serif;font-size:11px;font-style:italic;letter-spacing:3px;color:var(--gold);margin-top:2px}
.pills{display:flex;gap:6px}
.pill{font-size:10px;font-weight:500;letter-spacing:1px;border-radius:20px;padding:4px 10px;white-space:nowrap}
.pill-gold{background:var(--gold-dim);color:var(--gold);border:1px solid rgba(212,168,67,.3)}
.pill-cyan{background:var(--cyan-dim);color:var(--cyan);border:1px solid rgba(67,176,168,.3)}

/* Sacred Geometry */
.geo-section{display:flex;justify-content:center;padding:8px 0 4px;width:100%}
#sgCanvas{width:min(280px,75vw);height:min(280px,75vw)}
.freq-info{text-align:center;padding:0 20px 12px}
.freq-info-name{font-size:13px;letter-spacing:3px;color:var(--gold)}
.freq-info-desc{font-size:11px;color:var(--text3);margin-top:4px}

/* Waveform */
.wave-section{width:100%;padding:0 0 12px}
canvas#sVis{width:100%;height:40px;display:block}

/* Section labels */
.section-label{font-size:10px;font-weight:500;letter-spacing:4px;color:var(--text3);text-transform:uppercase;align-self:flex-start;margin-bottom:10px;width:100%}

/* Freq scroll */
.freq-scroll{display:flex;gap:8px;overflow-x:auto;width:100%;padding-bottom:20px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.freq-scroll::-webkit-scrollbar{display:none}
.freq-pill{flex-shrink:0;padding:8px 14px;border-radius:20px;border:1.5px solid var(--surface3);background:transparent;font-family:'Noto Serif JP',serif;font-size:12px;color:var(--text2);cursor:pointer;transition:all .2s;white-space:nowrap;min-height:44px;display:flex;flex-direction:column;align-items:center;gap:1px}
.freq-pill:active{background:var(--surface2)}
.freq-pill.on{background:var(--gold-dim);border-color:var(--gold);color:var(--gold)}
.freq-pill-hz{font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:600}
.freq-pill-name{font-size:9px;letter-spacing:1px}

/* Brainwave */
.bw-row{display:flex;gap:8px;overflow-x:auto;width:100%;padding-bottom:20px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.bw-row::-webkit-scrollbar{display:none}
.bw-pill{flex-shrink:0;padding:8px 14px;border-radius:20px;border:1.5px solid var(--surface3);background:transparent;font-family:'Noto Serif JP',serif;font-size:12px;color:var(--text2);cursor:pointer;transition:all .2s;white-space:nowrap;min-height:44px;display:flex;flex-direction:column;align-items:center;gap:1px}
.bw-pill.on{background:var(--cyan-dim);border-color:var(--cyan);color:var(--cyan)}
.bw-pill-name{font-size:11px;font-weight:500}
.bw-pill-hz{font-family:'Cormorant Garamond',serif;font-size:10px}

/* Modes */
.mode-row{display:flex;flex-wrap:wrap;gap:8px;width:100%;margin-bottom:20px}
.s-mode{padding:9px 16px;border-radius:24px;cursor:pointer;border:1.5px solid var(--surface3);background:transparent;font-family:'Noto Serif JP',serif;font-size:13px;color:var(--text2);transition:all .2s;min-height:44px;display:flex;align-items:center}
.s-mode:active{background:var(--surface2)}
.s-mode.on{background:var(--text);border-color:var(--text);color:var(--bg);box-shadow:var(--shadow)}

/* Sliders */
.slider-section{width:100%;display:flex;flex-direction:column;gap:16px;margin-bottom:24px}
.sl-row{display:flex;align-items:center;gap:14px;min-height:44px}
.sl-label{font-size:12px;font-weight:500;letter-spacing:1px;color:var(--text2);min-width:42px}
input.sl{flex:1;-webkit-appearance:none;height:3px;border-radius:2px;outline:none;cursor:pointer;background:var(--surface3)}
input.sl::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:var(--surface);border:2.5px solid var(--text);cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.3)}
input.sl::-moz-range-thumb{width:22px;height:22px;border-radius:50%;background:var(--surface);border:2.5px solid var(--text);cursor:pointer}
.sl-val{font-family:'Cormorant Garamond',serif;font-size:15px;color:var(--text3);min-width:40px;text-align:right}

/* Play */
.play-section{display:flex;flex-direction:column;align-items:center;gap:16px;margin-bottom:28px;width:100%}
.play-btn{width:80px;height:80px;border-radius:50%;border:2px solid var(--text);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;position:relative;transition:all .25s;box-shadow:var(--shadow)}
.play-btn::before,.play-btn::after{content:'';position:absolute;border-radius:50%;border:1.5px solid rgba(255,255,255,.06);animation:pulse 2.5s ease-out infinite}
.play-btn::before{inset:-14px}
.play-btn::after{inset:-28px;animation-delay:.8s}
@keyframes pulse{0%{opacity:.6;transform:scale(1)}100%{opacity:0;transform:scale(1.1)}}
.play-btn.on{background:var(--gold);border-color:var(--gold)}
.play-btn.on .play-ico{color:var(--bg);margin-left:0}
.play-ico{font-size:28px;color:var(--text);margin-left:4px;user-select:none;transition:all .2s}
.status-text{font-size:12px;font-weight:500;letter-spacing:3px;color:var(--text3);text-transform:uppercase;text-align:center}
.status-text.on{color:var(--cyan)}

/* Timer */
.timer-section{width:100%;margin-bottom:24px}
.timer-presets{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.timer-btn{padding:6px 14px;border-radius:20px;border:1.5px solid var(--surface3);background:transparent;font-family:'Cormorant Garamond',serif;font-size:14px;color:var(--text2);cursor:pointer;transition:all .2s;min-height:36px}
.timer-btn.on{background:var(--purple-dim);border-color:var(--purple);color:var(--purple)}
.timer-display{font-family:'Cormorant Garamond',serif;font-size:28px;color:var(--text3);letter-spacing:3px;text-align:center;min-height:36px}
.timer-display.active{color:var(--purple)}

/* Bottom actions */
.bottom-actions{display:flex;gap:10px;width:100%;padding-bottom:20px}
.action-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:10px;padding:16px;border-radius:var(--r);border:1.5px solid var(--surface3);background:transparent;font-family:'Noto Serif JP',serif;font-size:13px;font-weight:500;letter-spacing:2px;color:var(--text2);cursor:pointer;transition:all .2s;min-height:56px}
.action-btn:active{background:var(--surface)}
.action-btn svg{width:18px;height:18px;flex-shrink:0}

/* === BREATH OVERLAY === */
.breath-overlay{position:fixed;inset:0;z-index:200;background:rgba(8,8,16,.97);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px;opacity:0;pointer-events:none;transition:opacity .6s}
.breath-overlay.active{opacity:1;pointer-events:auto}
.breath-close{position:absolute;top:max(env(safe-area-inset-top,16px),16px);right:16px;width:44px;height:44px;border-radius:50%;border:1.5px solid var(--surface3);background:transparent;color:var(--text2);font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.breath-circle{width:120px;height:120px;border-radius:50%;border:2px solid var(--gold);box-shadow:0 0 30px rgba(212,168,67,.15);transition:transform 4s ease-in-out,border-color .5s,box-shadow 1s}
.breath-circle.inhale{transform:scale(1.8);border-color:var(--gold);box-shadow:0 0 60px rgba(212,168,67,.3)}
.breath-circle.hold{border-color:var(--cyan);box-shadow:0 0 60px rgba(67,176,168,.3)}
.breath-circle.exhale{transform:scale(1);border-color:var(--purple);box-shadow:0 0 40px rgba(120,104,184,.2)}
.breath-phase{font-size:22px;font-weight:300;letter-spacing:8px;color:var(--text)}
.breath-count{font-family:'Cormorant Garamond',serif;font-size:48px;color:var(--text3)}
.breath-tip{font-size:10px;letter-spacing:4px;color:var(--text3);text-transform:uppercase}

/* === MIXER VIEW === */
#vMixer{background:var(--surface);display:flex;flex-direction:column;min-height:100vh;min-height:100dvh}
.m-header{display:flex;align-items:center;justify-content:space-between;padding:max(env(safe-area-inset-top,0px),14px) 16px 14px;background:var(--bg);border-bottom:1px solid var(--surface2);box-shadow:var(--shadow);position:sticky;top:0;z-index:50;flex-shrink:0;gap:10px}
.m-back-btn{display:flex;align-items:center;gap:6px;cursor:pointer;padding:10px 14px;border-radius:10px;border:1.5px solid var(--surface3);background:transparent;font-family:'Noto Serif JP',serif;font-size:12px;font-weight:500;color:var(--text2);transition:all .18s;min-height:44px;white-space:nowrap}
.m-back-btn:active{background:var(--surface2)}
.m-header-title{font-size:13px;font-weight:700;letter-spacing:3px;color:var(--text);flex:1;text-align:center}
.m-header-btns{display:flex;gap:8px}
.m-play-btn{padding:10px 18px;border-radius:10px;cursor:pointer;font-family:'Noto Serif JP',serif;font-size:12px;font-weight:700;letter-spacing:2px;border:none;background:var(--text);color:var(--bg);min-height:44px;transition:all .2s;white-space:nowrap}
.m-play-btn.on{background:var(--red)}
.m-play-btn:active{opacity:.85}
.m-stop-btn{padding:10px 14px;border-radius:10px;cursor:pointer;min-height:44px;font-size:16px;border:1.5px solid var(--surface3);background:transparent;color:var(--text2)}
.m-stop-btn:active{background:var(--surface2)}
.m-vis{width:100%;height:56px;background:var(--bg);border-bottom:1px solid var(--surface2);flex-shrink:0}
canvas#mVis{width:100%;height:100%;display:block}
.m-scroll{display:flex;overflow-x:auto;flex:1;padding-bottom:70px;-webkit-overflow-scrolling:touch}
.m-scroll::-webkit-scrollbar{display:none}
.ch{display:flex;flex-direction:column;align-items:center;width:112px;min-width:112px;padding:0 0 16px;background:var(--bg);border-right:1px solid var(--surface2);position:relative}
.ch.muted{opacity:.3}
.ch-accent{height:4px;width:100%;margin-bottom:10px;flex-shrink:0}
.ch-head{display:flex;flex-direction:column;align-items:center;margin-bottom:8px}
.ch-icon{font-size:20px;line-height:1.2}
.ch-name{font-size:9px;font-weight:500;letter-spacing:3px;color:var(--text3);text-transform:uppercase;text-align:center}
.vu-row{display:flex;gap:2px;align-items:flex-end;height:32px;margin-bottom:8px}
.vus{width:7px;height:4px;border-radius:1px;background:var(--surface3);transition:background .06s}
.vu-g{background:var(--cyan) !important}
.vu-y{background:var(--gold) !important}
.vu-r{background:var(--red) !important}
.eq-block{width:100%;padding:0 7px;margin-bottom:7px}
.block-title{font-size:8px;font-weight:500;letter-spacing:3px;color:var(--text3);text-transform:uppercase;text-align:center;padding:4px 0;border-top:1px solid var(--surface2);border-bottom:1px solid var(--surface2);margin-bottom:7px}
.eq-knobs{display:flex;justify-content:space-around}
.kw{display:flex;flex-direction:column;align-items:center;gap:3px}
.k-lbl{font-size:7px;font-weight:500;letter-spacing:1.5px;color:var(--text3);text-transform:uppercase}
.k-val{font-family:'Cormorant Garamond',serif;font-size:10px;color:var(--text3)}
.knob{width:30px;height:30px;border-radius:50%;cursor:ns-resize;position:relative;background:linear-gradient(145deg,var(--surface2),var(--surface));border:1.5px solid var(--surface3);user-select:none;box-shadow:0 2px 6px rgba(0,0,0,.3)}
.knob::after{content:'';position:absolute;top:4px;left:50%;width:2px;height:7px;border-radius:1px;background:var(--kc,var(--text));transform-origin:bottom center;transform:translateX(-50%)}
.knob.sm{width:24px;height:24px}
.knob.sm::after{top:3px;height:5px}
.rev-block{display:flex;flex-direction:column;align-items:center;gap:3px;margin-bottom:8px}
.pan-block{display:flex;flex-direction:column;align-items:center;gap:5px;margin-bottom:8px}
.pan-track{width:72px;height:2px;background:var(--surface3);border-radius:1px;position:relative}
.pan-center-mark{position:absolute;left:50%;top:-3px;width:1px;height:8px;background:var(--surface3);transform:translateX(-50%)}
.pan-dot{position:absolute;top:-6px;width:14px;height:14px;border-radius:50%;background:var(--surface);border:2px solid var(--kc,var(--text));cursor:ew-resize;transform:translateX(-50%);box-shadow:0 1px 6px rgba(0,0,0,.3)}
.fader-block{display:flex;flex-direction:column;align-items:center;gap:6px;flex:1;padding:0 6px}
.fader-rail{width:4px;height:100px;background:var(--surface3);border-radius:2px;position:relative;border:1px solid var(--surface2)}
.fader-fill{position:absolute;bottom:0;left:-1px;right:-1px;border-radius:2px;opacity:.6}
.fader-knob{position:absolute;left:50%;width:28px;height:12px;border-radius:3px;background:var(--surface);border:1.5px solid var(--surface3);transform:translate(-50%,-50%);cursor:ns-resize;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.fader-knob:active{border-color:var(--text)}
.fader-db{font-family:'Cormorant Garamond',serif;font-size:11px;color:var(--text3)}
.ms-row{display:flex;gap:5px;width:calc(100% - 12px)}
.btn-ms{flex:1;padding:7px 0;border-radius:6px;cursor:pointer;min-height:36px;font-family:'Noto Serif JP',serif;font-size:10px;font-weight:700;letter-spacing:1px;border:1.5px solid var(--surface3);background:transparent;color:var(--text3);transition:all .18s}
.btn-ms:active{background:var(--surface2)}
.btn-ms.mute.on{background:var(--red);border-color:var(--red);color:#fff}
.btn-ms.solo.on{background:var(--text);border-color:var(--text);color:var(--bg)}
.master-strip{width:130px;min-width:130px;display:flex;flex-direction:column;align-items:center;padding:0 12px 16px;background:rgba(212,168,67,.05);border-left:3px solid var(--gold)}
.master-accent{height:4px;width:100%;background:var(--gold);margin-bottom:10px}
.master-label{font-size:9px;font-weight:700;letter-spacing:4px;color:var(--gold);text-transform:uppercase;margin-bottom:10px}
.master-vu{display:flex;gap:4px;justify-content:center;margin-bottom:8px}
.mvcol{display:flex;flex-direction:column-reverse;gap:2px}
.mvseg{width:9px;height:4px;border-radius:1px;background:var(--surface3)}
.m-bottom{position:fixed;bottom:0;left:0;right:0;z-index:40;background:rgba(8,8,16,.96);border-top:1px solid var(--surface2);padding:10px 16px;padding-bottom:max(10px,env(safe-area-inset-bottom,10px));display:flex;align-items:center;justify-content:space-between;backdrop-filter:blur(12px);gap:12px}
.m-time{font-family:'Cormorant Garamond',serif;font-size:18px;color:var(--text3);letter-spacing:2px}
.m-st{font-size:9px;font-weight:500;letter-spacing:3px;color:var(--text3);text-transform:uppercase}
.m-st.on{color:var(--cyan)}
.m-vol-row{display:flex;align-items:center;gap:8px}
.m-vol-lbl{font-size:9px;font-weight:500;letter-spacing:2px;color:var(--text3);text-transform:uppercase}
</style>
</head>
<body>

<!-- ===== MAIN VIEW ===== -->
<div class="view" id="vMain">
  <div class="header">
    <div>
      <div class="brand-jp">インナーバース</div>
      <div class="brand-en">Inner Birth Sound v5</div>
    </div>
    <div class="pills">
      <span class="pill pill-gold" id="hzBadge">432 Hz</span>
      <span class="pill pill-cyan" id="bwBadge">7.83 Hz</span>
    </div>
  </div>

  <div class="geo-section"><canvas id="sgCanvas"></canvas></div>
  <div class="freq-info">
    <div class="freq-info-name" id="freqName">宇宙の調和 · Universal Harmony</div>
    <div class="freq-info-desc" id="freqDesc">自然との共鳴、心身の調和</div>
  </div>
  <div class="wave-section"><canvas id="sVis"></canvas></div>

  <div class="section-label">周波数</div>
  <div class="freq-scroll" id="freqScroll"></div>

  <div class="section-label">脳波エントレインメント</div>
  <div class="bw-row" id="bwRow"></div>

  <div class="section-label">サウンドモード</div>
  <div class="mode-row" id="modeRow"></div>

  <div class="section-label">コントロール</div>
  <div class="slider-section">
    <div class="sl-row">
      <span class="sl-label">音量</span>
      <input class="sl" type="range" id="sVol" min="0" max="100" value="75" oninput="onSVol(this)">
      <span class="sl-val" id="sVolV">75%</span>
    </div>
    <div class="sl-row">
      <span class="sl-label">残響</span>
      <input class="sl" type="range" id="sRev" min="0" max="100" value="50" oninput="onSRev(this)">
      <span class="sl-val" id="sRevV">50%</span>
    </div>
  </div>

  <div class="play-section">
    <button class="play-btn" id="sPlayBtn" onclick="togglePlay()">
      <span class="play-ico" id="sPlayIco">&#x25B6;</span>
    </button>
    <div class="status-text" id="sStatus">タップして開始</div>
  </div>

  <div class="section-label">瞑想タイマー</div>
  <div class="timer-section">
    <div class="timer-presets" id="timerPresets"></div>
    <div class="timer-display" id="timerDisplay"></div>
  </div>

  <div class="bottom-actions">
    <button class="action-btn" onclick="openBreath()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4"/></svg>
      呼吸ガイド
    </button>
    <button class="action-btn" onclick="goMixer()">
      <svg viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
        <line x1="2" y1="5" x2="16" y2="5"/><circle cx="6" cy="5" r="2" fill="currentColor" stroke="none"/>
        <line x1="2" y1="9" x2="16" y2="9"/><circle cx="11" cy="9" r="2" fill="currentColor" stroke="none"/>
        <line x1="2" y1="13" x2="16" y2="13"/><circle cx="7" cy="13" r="2" fill="currentColor" stroke="none"/>
      </svg>
      詳細ミキサー
    </button>
  </div>
</div>

<!-- ===== BREATH OVERLAY ===== -->
<div class="breath-overlay" id="breathOverlay">
  <button class="breath-close" onclick="closeBreath()">&times;</button>
  <div class="breath-circle" id="breathCircle"></div>
  <div class="breath-phase" id="breathPhase">吸う</div>
  <div class="breath-count" id="breathCount">4</div>
  <div class="breath-tip">4-7-8 呼吸法</div>
</div>

<!-- ===== MIXER VIEW ===== -->
<div class="view away" id="vMixer">
  <div class="m-header">
    <button class="m-back-btn" onclick="goMain()">&#x2190; 戻る</button>
    <div class="m-header-title">詳細ミキサー</div>
    <div class="m-header-btns">
      <button class="m-play-btn" id="mPlayBtn" onclick="togglePlay()">&#x25B6; 開始</button>
      <button class="m-stop-btn" onclick="stopAll()">&#x25A0;</button>
    </div>
  </div>
  <div class="m-vis"><canvas id="mVis"></canvas></div>
  <div class="m-scroll" id="mCh"></div>
  <div class="m-bottom">
    <div class="m-time" id="mTime">00:00:00</div>
    <div class="m-st" id="mSt">READY</div>
    <div class="m-vol-row">
      <span class="m-vol-lbl">MASTER</span>
      <input class="sl" type="range" id="mMVol" min="0" max="100" value="80" style="width:64px" oninput="onMVol(this)">
      <span class="sl-val" id="mMVolV">80%</span>
    </div>
  </div>
</div>

<script>
/* =============================================================
   DATA
   ============================================================= */
var SOLFEGGIO = [

/* =============================================================
   BUILDERS
   ============================================================= */
function bDrone(ac){
  var out=ac.createGain();out.gain.value=1;var os=[];
  var harmonics=[1,2,3,4,5];var gains=[.46,.23,.12,.07,.04];
  for(var i=0;i<harmonics.length;i++){var o=ac.createOscillator();o.type='sine';o.frequency.value=BASE*harmonics[i];var g=ac.createGain();g.gain.value=gains[i];o.connect(g);g.connect(out);o.start();os.push(o);}
  return{out:out,stop:function(){for(var j=0;j<os.length;j++){try{os[j].stop();}catch(e){}}}};
}
function bHarm(ac){
  var out=ac.createGain();out.gain.value=1;var os=[];
  var harmonics=[1,1.5,2,3,4];var gains=[.3,.17,.13,.08,.05];
  for(var i=0;i<harmonics.length;i++){for(var dt=0;dt<2;dt++){var o=ac.createOscillator();o.type='triangle';o.frequency.value=BASE*harmonics[i]*(dt===0?1:1.002);var g=ac.createGain();g.gain.value=gains[i]*.55;o.connect(g);g.connect(out);o.start();os.push(o);}}
  return{out:out,stop:function(){for(var j=0;j<os.length;j++){try{os[j].stop();}catch(e){}}}};
}
function bBinaural(ac){
  var out=ac.createGain();out.gain.value=1;var os=[];
  var mg=ac.createChannelMerger(2);mg.connect(out);
  var freqs=[BASE,BASE+ENTRAINMENT];
  for(var ch=0;ch<2;ch++){var o=ac.createOscillator();o.type='sine';o.frequency.value=freqs[ch];var g=ac.createGain();g.gain.value=.38;o.connect(g);g.connect(mg,0,ch);o.start();os.push(o);}
  return{out:out,stop:function(){for(var j=0;j<os.length;j++){try{os[j].stop();}catch(e){}}}};
}
function bPulse(ac){
  var out=ac.createGain();out.gain.value=1;var os=[];
  var car=ac.createOscillator();car.type='sine';car.frequency.value=BASE*2;
  var lfo=ac.createOscillator();lfo.type='sine';lfo.frequency.value=3.5;
  var lg=ac.createGain();lg.gain.value=.36;var ag=ac.createGain();ag.gain.value=.4;
  lfo.connect(lg);lg.connect(ag.gain);car.connect(ag);ag.connect(out);
  car.start();lfo.start();os.push(car,lfo);
  return{out:out,stop:function(){for(var j=0;j<os.length;j++){try{os[j].stop();}catch(e){}}}};
}
function bNature(ac){
  var buf=ac.createBuffer(1,ac.sampleRate*4,ac.sampleRate);
  var d=buf.getChannelData(0);var last=0;
  for(var i=0;i<d.length;i++){var w=Math.random()*2-1;d[i]=(last+.022*w)/1.022;last=d[i];d[i]*=3;}
  var src=ac.createBufferSource();src.buffer=buf;src.loop=true;
  var f=ac.createBiquadFilter();f.type='bandpass';f.frequency.value=360;f.Q.value=.7;
  var out=ac.createGain();out.gain.value=1;
  src.connect(f);f.connect(out);src.start();
  return{out:out,stop:function(){try{src.stop();}catch(e){}}};
}
function bBell(ac){
  var out=ac.createGain();out.gain.value=1;var alive=true;
  function ring(){
    if(!alive)return;
    var harmonics=[1,2.76,5.4,8.93];var decs=[4,2.5,1.5,.8];
    for(var i=0;i<harmonics.length;i++){var o=ac.createOscillator();o.type='sine';o.frequency.value=BASE*4*harmonics[i];var g=ac.createGain();g.gain.setValueAtTime(.16/(i+1),ac.currentTime);g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+decs[i]);o.connect(g);g.connect(out);o.start();o.stop(ac.currentTime+decs[i]+.1);}
    setTimeout(ring,3500+Math.random()*5000);
  }
  ring();
  return{out:out,stop:function(){alive=false;}};
}

function initAC(){
  if(AC)return;
  AC=new(window.AudioContext||window.webkitAudioContext)();
  mG=AC.createGain();mG.gain.value=.8;mG.connect(AC.destination);
  mAn=AC.createAnalyser();mAn.fftSize=1024;mAn.connect(mG);
  var buf=AC.createBuffer(2,AC.sampleRate*4,AC.sampleRate);
  for(var c=0;c<2;c++){var da=buf.getChannelData(c);for(var i=0;i<da.length;i++)da[i]=(Math.random()*2-1)*Math.pow(1-i/da.length,1.9);}
  cnv=AC.createConvolver();cnv.buffer=buf;
  cnvG=AC.createGain();cnvG.gain.value=.45;cnv.connect(cnvG);cnvG.connect(mG);
}
function startCh(id){
  var s=CS[id];if(s.nd)return;
  var ch=null;for(var i=0;i<CH.length;i++){if(CH[i].id===id){ch=CH[i];break;}}if(!ch)return;
  var snd=ch.build(AC);
  var gn=AC.createGain();gn.gain.value=s.muted?0:s.vol;
  var pn=AC.createStereoPanner();pn.pan.value=s.pan;
  var eL=AC.createBiquadFilter();eL.type='lowshelf';eL.frequency.value=200;eL.gain.value=s.eqL*12;
  var eM=AC.createBiquadFilter();eM.type='peaking';eM.frequency.value=1000;eM.Q.value=1;eM.gain.value=s.eqM*12;
  var eH=AC.createBiquadFilter();eH.type='highshelf';eH.frequency.value=4000;eH.gain.value=s.eqH*12;
  var dg=AC.createGain();dg.gain.value=1-s.rev;
  var rg=AC.createGain();rg.gain.value=s.rev;
  var an=AC.createAnalyser();an.fftSize=256;
  snd.out.connect(gn);gn.connect(pn);pn.connect(eL);eL.connect(eM);eM.connect(eH);
  eH.connect(dg);dg.connect(an);an.connect(mAn);
  eH.connect(rg);rg.connect(cnv);
  s.nd=snd;s.gN=gn;s.pN=pn;s.eLN=eL;s.eMN=eM;s.eHN=eH;s.rG=rg;s.dG=dg;s.an=an;
}
function stopCh(id){var s=CS[id];if(!s.nd)return;try{s.nd.stop();}catch(e){}s.nd=null;s.gN=null;s.pN=null;s.eLN=null;s.eMN=null;s.eHN=null;s.rG=null;s.dG=null;s.an=null;}
function startActive(){var act=MODES[curMode]||MODES.all;for(var i=0;i<CH.length;i++){if(act.indexOf(CH[i].id)>=0)startCh(CH[i].id);else stopCh(CH[i].id);}}

  else{playing=false;for(var i=0;i<CH.length;i++)stopCh(CH[i].id);clearInterval(ticker);clearTimerCountdown();}

}
function stopAll(){if(playing){playing=false;for(var i=0;i<CH.length;i++)stopCh(CH[i].id);clearInterval(ticker);clearTimerCountdown();}syncUI();}

function setTimer(idx){
  timerMinutes=TIMERS[idx].min;
  for(var i=0;i<TIMERS.length;i++){var el=document.getElementById('tb'+i);if(el)el.classList.toggle('on',i===idx);}
  clearTimerCountdown();
  var disp=document.getElementById('timerDisplay');
  if(timerMinutes===0){disp.textContent='';disp.classList.remove('active');}
  else{disp.textContent=('0'+timerMinutes).slice(-2)+':00';disp.classList.add('active');if(playing)startTimerCountdown();}
}
function startTimerCountdown(){clearTimerCountdown();if(timerMinutes<=0)return;timerEnd=Date.now()+timerMinutes*60000;timerInterval=setInterval(tickTimer,500);}
function clearTimerCountdown(){if(timerInterval){clearInterval(timerInterval);timerInterval=null;}if(fadeOutTimer){clearTimeout(fadeOutTimer);fadeOutTimer=null;}}
function tickTimer(){
  var rem=timerEnd-Date.now();var disp=document.getElementById('timerDisplay');
  if(rem<=0){clearInterval(timerInterval);timerInterval=null;disp.textContent='00:00';onTimerEnd();return;}
  var sec=Math.ceil(rem/1000);disp.textContent=('0'+Math.floor(sec/60)).slice(-2)+':'+('0'+(sec%60)).slice(-2);
}
function onTimerEnd(){
  if(AC){var o=AC.createOscillator();o.type='sine';o.frequency.value=528*4;var g=AC.createGain();g.gain.setValueAtTime(.15,AC.currentTime);g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+4);o.connect(g);g.connect(AC.destination);o.start();o.stop(AC.currentTime+4.5);}
  if(playing&&mG&&AC){var cv=mG.gain.value;mG.gain.linearRampToValueAtTime(0,AC.currentTime+8);fadeOutTimer=setTimeout(function(){stopAll();if(mG)mG.gain.value=cv;},8500);}
}

/* =============================================================

var sgc,sgx,sgW,sgH,sgRot=0;
var sgParts=[];for(var pi=0;pi<30;pi++)sgParts.push({a:Math.random()*Math.PI*2,r:Math.random(),spd:.001+Math.random()*.003,sz:.5+Math.random()*1.5,al:.2+Math.random()*.4});

function initSG(){sgc=document.getElementById('sgCanvas');sgx=sgc.getContext('2d');rszSG();}
function rszSG(){if(!sgc)return;var dpr=devicePixelRatio||1;sgW=sgc.offsetWidth*dpr;sgH=sgc.offsetHeight*dpr;sgc.width=sgW;sgc.height=sgH;}
function getAmp(){if(!mAn||!playing)return 0;var d=new Float32Array(mAn.frequencyBinCount);mAn.getFloatTimeDomainData(d);var r=0;for(var i=0;i<d.length;i++)r+=d[i]*d[i];return Math.min(1,Math.sqrt(r/d.length)*5);}
function drawSG(){
  requestAnimationFrame(drawSG);if(!sgx)return;
  sgx.clearRect(0,0,sgW,sgH);
  var cx=sgW/2,cy=sgH/2,bR=Math.min(sgW,sgH)*.14;
  var amp=getAmp(),hue=SOLFEGGIO[curFreqIdx].hue;
  sgRot+=.002;var baseA=.12+amp*.45,glow=2+amp*18,lw=(1+amp*1.5)*(devicePixelRatio||1);

  sgx.save();sgx.translate(cx,cy);sgx.rotate(sgRot);
  /* Flower of Life: 19 circles */
  var circles=[{x:0,y:0}];
  for(var i=0;i<6;i++){var a=i*Math.PI/3;circles.push({x:Math.cos(a)*bR,y:Math.sin(a)*bR});}
  for(var j=0;j<6;j++){var a2=j*Math.PI/3;circles.push({x:Math.cos(a2)*bR*2,y:Math.sin(a2)*bR*2});}
  for(var k=0;k<6;k++){var a3=k*Math.PI/3+Math.PI/6;circles.push({x:Math.cos(a3)*bR*1.732,y:Math.sin(a3)*bR*1.732});}
  for(var c2=0;c2<circles.length;c2++){
    var ci3=circles[c2],dist=Math.sqrt(ci3.x*ci3.x+ci3.y*ci3.y),nd=dist/(bR*2.1);
    var al=baseA*(1-nd*.4),h2=(hue+nd*30)%360;
    sgx.beginPath();sgx.arc(ci3.x,ci3.y,bR,0,Math.PI*2);
    sgx.strokeStyle='hsla('+h2+',60%,'+(50+amp*20)+'%,'+al+')';sgx.lineWidth=lw;sgx.stroke();
    if(amp>.05){sgx.beginPath();sgx.arc(ci3.x,ci3.y,bR,0,Math.PI*2);sgx.strokeStyle='hsla('+h2+',80%,70%,'+(amp*.12)+')';sgx.lineWidth=lw+3;sgx.stroke();}
  }
  sgx.restore();
  /* outer ring */
  sgx.strokeStyle='hsla('+hue+',40%,35%,'+(baseA*.25)+')';sgx.lineWidth=.8*(devicePixelRatio||1);
  sgx.beginPath();sgx.arc(cx,cy,bR*3.2,0,Math.PI*2);sgx.stroke();
  /* particles */
  var maxR=bR*3.2,dpr=devicePixelRatio||1;
  for(var p=0;p<sgParts.length;p++){var pt=sgParts[p];pt.a+=pt.spd;pt.r+=.0005;if(pt.r>1.3){pt.r=.3+Math.random()*.2;pt.a=Math.random()*Math.PI*2;}
    var pd=pt.r*maxR,px=cx+Math.cos(pt.a)*pd,py=cy+Math.sin(pt.a)*pd,fade=1-(pt.r-.3)/1,pAl=pt.al*fade*(playing?.6+amp*2:.3);
    pAl=Math.max(0,Math.min(1,pAl));sgx.beginPath();sgx.arc(px,py,pt.sz*dpr,0,Math.PI*2);sgx.fillStyle='hsla('+hue+',60%,70%,'+pAl+')';sgx.fill();}
  /* center text */
  sgx.save();sgx.textAlign='center';sgx.textBaseline='middle';
  sgx.font=(22*dpr)+'px Cormorant Garamond,serif';sgx.fillStyle='hsla('+hue+',50%,'+(60+amp*20)+'%,'+(0.5+amp*.3)+')';
  sgx.fillText(BASE+' Hz',cx,cy);sgx.restore();
}

/* =============================================================
   MIXER BUILD
   ============================================================= */
function buildMixer(){
  var wrap=document.getElementById('mCh');
  for(var i=0;i<CH.length;i++){var div=document.createElement('div');div.className='ch';div.id='ch-'+CH[i].id;div.innerHTML=mkCh(CH[i]);wrap.appendChild(div);}
  var ms=document.createElement('div');ms.className='master-strip';
  ms.innerHTML='<div class="master-accent"></div><div class="master-label">MASTER</div><div class="master-vu"><div class="mvcol" id="mvcol0"></div><div class="mvcol" id="mvcol1"></div></div>';
  wrap.appendChild(ms);
  for(var c=0;c<2;c++){var col=document.getElementById('mvcol'+c);for(var j=0;j<10;j++){var sg=document.createElement('div');sg.className='mvseg';col.appendChild(sg);}}
  initKnobs();initPans();initFaders();
}
function mkCh(c){
  var r='';
  r+='<div class="ch-accent" style="background:'+c.color+'"></div>';
  r+='<div class="ch-head"><div class="ch-icon">'+c.icon+'</div><div class="ch-name">'+c.name+'</div></div>';
  r+='<div class="vu-row">';for(var i=0;i<6;i++)r+='<div class="vus" id="vu-'+c.id+'-'+i+'"></div>';r+='</div>';
  r+='<div class="eq-block"><div class="block-title">EQ</div><div class="eq-knobs">';
  var bands=[['L','eqL'],['M','eqM'],['H','eqH']];
  for(var b=0;b<bands.length;b++){r+='<div class="kw"><div class="k-lbl">'+bands[b][0]+'</div><div class="knob sm" id="k'+bands[b][0]+c.id+'" data-val="50" data-eqch="'+c.id+'" data-eqb="'+bands[b][1]+'" style="--kc:'+c.color+'"></div><div class="k-val" id="kv'+bands[b][0]+c.id+'">0</div></div>';}
  r+='</div></div>';
  r+='<div class="rev-block"><div class="k-lbl">REV</div><div class="knob sm" id="kr'+c.id+'" data-val="40" data-rch="'+c.id+'" style="--kc:'+c.color+'"></div><div class="k-val" id="krv'+c.id+'">40</div></div>';
  r+='<div class="pan-block"><div class="k-lbl">PAN</div><div class="pan-track" id="pt'+c.id+'"><div class="pan-center-mark"></div><div class="pan-dot" id="pd'+c.id+'" style="left:50%;--kc:'+c.color+';border-color:'+c.color+'"></div></div></div>';
  r+='<div class="fader-block"><div class="fader-rail" id="fr'+c.id+'"><div class="fader-fill" id="ff'+c.id+'" style="height:75%;background:'+c.color+'"></div><div class="fader-knob" id="fk'+c.id+'" style="bottom:calc(75% - 6px)"></div></div><div class="fader-db" id="fdb'+c.id+'">0 dB</div></div>';
  r+='<div class="ms-row"><button class="btn-ms mute" id="mu'+c.id+'" onclick="tMute(\''+c.id+'\')">M</button><button class="btn-ms solo" id="so'+c.id+'" onclick="tSolo(\''+c.id+'\')">S</button></div>';
  return r;
}

/* =============================================================
   KNOBS
   ============================================================= */
function initKnobs(){
  var knobs=document.querySelectorAll('.knob');
  for(var ki=0;ki<knobs.length;ki++){(function(k){
    var sy,sv;
    function mv(cy){var nv=Math.max(0,Math.min(100,sv+(sy-cy)*.8));k.dataset.val=nv;k.style.transform='rotate('+(-135+nv*2.7)+'deg)';onKC(k,nv);}
    k.addEventListener('mousedown',function(e){sy=e.clientY;sv=+k.dataset.val||50;function mm(e2){mv(e2.clientY);}function mu(){window.removeEventListener('mousemove',mm);window.removeEventListener('mouseup',mu);}window.addEventListener('mousemove',mm);window.addEventListener('mouseup',mu);e.preventDefault();});
    k.addEventListener('touchstart',function(e){sy=e.touches[0].clientY;sv=+k.dataset.val||50;function tm(e2){mv(e2.touches[0].clientY);e2.preventDefault();}function tu(){window.removeEventListener('touchmove',tm);window.removeEventListener('touchend',tu);}window.addEventListener('touchmove',tm,{passive:false});window.addEventListener('touchend',tu);e.preventDefault();},{passive:false});
    k.style.transform='rotate('+(-135+(+k.dataset.val||50)*2.7)+'deg)';
  })(knobs[ki]);}
}
function onKC(k,v){
  if(k.dataset.eqch&&k.dataset.eqb){var cid=k.dataset.eqch,bk=k.dataset.eqb,n=(v-50)/50,db=Math.round(n*12);var lbMap={eqL:'L',eqM:'M',eqH:'H'};var lb=lbMap[bk];var el=document.getElementById('kv'+lb+cid);if(el)el.textContent=(db>0?'+':'')+db;CS[cid][bk]=n;var nkMap={eqL:'eLN',eqM:'eMN',eqH:'eHN'};var nd=CS[cid][nkMap[bk]];if(nd&&AC)nd.gain.linearRampToValueAtTime(db,AC.currentTime+.05);}
  if(k.dataset.rch){var cid2=k.dataset.rch,rv=v/100;CS[cid2].rev=rv;var el2=document.getElementById('krv'+cid2);if(el2)el2.textContent=Math.round(v);if(CS[cid2].rG&&AC)CS[cid2].rG.gain.linearRampToValueAtTime(rv,AC.currentTime+.05);if(CS[cid2].dG&&AC)CS[cid2].dG.gain.linearRampToValueAtTime(1-rv,AC.currentTime+.05);}
}

/* =============================================================
   PAN + FADER
   ============================================================= */
function initPans(){
  for(var pi2=0;pi2<CH.length;pi2++){(function(c){
    var tr=document.getElementById('pt'+c.id),th=document.getElementById('pd'+c.id);if(!tr||!th)return;
    var drag=false,sx,sl;
    function sp(left){left=Math.max(0,Math.min(1,left));th.style.left=(left*100)+'%';var p2=(left-.5)*2;CS[c.id].pan=p2;if(CS[c.id].pN&&AC)CS[c.id].pN.pan.linearRampToValueAtTime(p2,AC.currentTime+.05);}
    th.addEventListener('mousedown',function(e){drag=true;sx=e.clientX;sl=parseFloat(th.style.left)/100;e.preventDefault();});
    window.addEventListener('mousemove',function(e){if(drag)sp(sl+(e.clientX-sx)/tr.offsetWidth);});
    window.addEventListener('mouseup',function(){drag=false;});
    th.addEventListener('touchstart',function(e){drag=true;sx=e.touches[0].clientX;sl=parseFloat(th.style.left)/100;e.preventDefault();},{passive:false});
    window.addEventListener('touchmove',function(e){if(drag){sp(sl+(e.touches[0].clientX-sx)/tr.offsetWidth);e.preventDefault();}},{passive:false});
    window.addEventListener('touchend',function(){drag=false;});
  })(CH[pi2]);}
}
function initFaders(){
  for(var fi=0;fi<CH.length;fi++){(function(c){
    var tr=document.getElementById('fr'+c.id),th=document.getElementById('fk'+c.id),fill=document.getElementById('ff'+c.id),dbEl=document.getElementById('fdb'+c.id);if(!tr||!th)return;
    var drag=false,sy,sp2;
    function sf(p){p=Math.max(0,Math.min(1,p));th.style.bottom='calc('+(p*100)+'% - 6px)';fill.style.height=(p*100)+'%';dbEl.textContent=p===0?'-inf':(20*Math.log10(p)).toFixed(1)+' dB';CS[c.id].vol=p;if(CS[c.id].gN&&AC)CS[c.id].gN.gain.linearRampToValueAtTime(CS[c.id].muted?0:p,AC.currentTime+.05);}
    th.addEventListener('mousedown',function(e){drag=true;sy=e.clientY;sp2=CS[c.id].vol;e.preventDefault();});
    window.addEventListener('mousemove',function(e){if(drag)sf(sp2-(e.clientY-sy)/tr.offsetHeight);});
    window.addEventListener('mouseup',function(){drag=false;});
    th.addEventListener('touchstart',function(e){drag=true;sy=e.touches[0].clientY;sp2=CS[c.id].vol;e.preventDefault();},{passive:false});
    window.addEventListener('touchmove',function(e){if(drag){sf(sp2-(e.touches[0].clientY-sy)/tr.offsetHeight);e.preventDefault();}},{passive:false});
    window.addEventListener('touchend',function(){drag=false;});
  })(CH[fi]);}
}

/* =============================================================
   MUTE / SOLO
   ============================================================= */
function tMute(id){var s=CS[id];s.muted=!s.muted;document.getElementById('mu'+id).classList.toggle('on',s.muted);document.getElementById('ch-'+id).classList.toggle('muted',s.muted);if(s.gN&&AC)s.gN.gain.linearRampToValueAtTime(s.muted?0:s.vol,AC.currentTime+.05);}
function tSolo(id){CS[id].soloed=!CS[id].soloed;var any=false;for(var i=0;i<CH.length;i++){if(CS[CH[i].id].soloed){any=true;break;}}for(var j=0;j<CH.length;j++){var s=CS[CH[j].id];document.getElementById('so'+CH[j].id).classList.toggle('on',s.soloed);if(s.gN&&AC){var eff=(!any||s.soloed)&&!s.muted?s.vol:0;s.gN.gain.linearRampToValueAtTime(eff,AC.currentTime+.05);}}}

/* =============================================================
   UI BUILD
   ============================================================= */
function buildFreqPills(){
  var wrap=document.getElementById('freqScroll');
  for(var i=0;i<SOLFEGGIO.length;i++){(function(idx){
    var btn=document.createElement('button');btn.className='freq-pill'+(idx===curFreqIdx?' on':'');
    btn.innerHTML='<span class="freq-pill-hz">'+SOLFEGGIO[idx].freq+'</span><span class="freq-pill-name">'+SOLFEGGIO[idx].name+'</span>';
    btn.onclick=function(){changeBase(idx);};wrap.appendChild(btn);
  })(i);}
}
function buildBwPills(){
  var wrap=document.getElementById('bwRow');
  for(var i=0;i<BRAINWAVES.length;i++){(function(idx){
    var btn=document.createElement('button');btn.className='bw-pill'+(idx===curBwIdx?' on':'');
    btn.innerHTML='<span class="bw-pill-name">'+BRAINWAVES[idx].name+'</span><span class="bw-pill-hz">'+BRAINWAVES[idx].freq+'Hz</span>';
    btn.onclick=function(){changeBrainwave(idx);};wrap.appendChild(btn);
  })(i);}
}
function buildModeBtns(){
  var wrap=document.getElementById('modeRow');
  for(var i=0;i<MODE_LABELS.length;i++){(function(idx){
    var btn=document.createElement('button');btn.className='s-mode'+(MODE_LABELS[idx].id==='all'?' on':'');btn.id='mb'+MODE_LABELS[idx].id;
    btn.textContent=MODE_LABELS[idx].icon+' '+MODE_LABELS[idx].label;
    btn.onclick=function(){setMode(MODE_LABELS[idx].id);};wrap.appendChild(btn);
  })(i);}
}
function buildTimerBtns(){
  var wrap=document.getElementById('timerPresets');
  for(var i=0;i<TIMERS.length;i++){(function(idx){
    var btn=document.createElement('button');btn.className='timer-btn'+(idx===0?' on':'');btn.id='tb'+idx;
    btn.textContent=TIMERS[idx].label;
    btn.onclick=function(){setTimer(idx);};wrap.appendChild(btn);
  })(i);}
}

/* =============================================================
   INIT
   ============================================================= */
function init(){
  buildFreqPills();buildBwPills();buildModeBtns();buildTimerBtns();buildMixer();initCanvases();initSG();
  var sliders=document.querySelectorAll('.sl');for(var i=0;i<sliders.length;i++)setSl(sliders[i]);
  drawIdle();drawSG();
}
init();
</script>
